<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inkfish</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- deep: ヘッダー全域をドラッグ領域にする(button 等のクリック可能要素は自動で除外される) -->
    <header id="toolbar" data-tauri-drag-region="deep">
      <div class="tb-spacer"></div>

      <div id="capsule" class="hidden">
        <span id="live-dot" title="ファイルの変更を監視中"></span>
        <span id="file-name"></span>
        <span id="mode-badge" class="hidden">MARP</span>
      </div>

      <div class="tb-actions">
        <button id="btn-edit" class="tb-btn hidden" title="エディタで開く (⌘E)">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2L5 13l-2.7.7L3 11l8.5-8.5z"/></svg>
        </button>
        <button id="btn-open" class="tb-btn" title="ファイルを開く (⌘O)">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4.5A1.5 1.5 0 0 1 3.5 3h3l1.5 1.5h4.5A1.5 1.5 0 0 1 14 6v5.5A1.5 1.5 0 0 1 12.5 13h-9A1.5 1.5 0 0 1 2 11.5v-7z"/></svg>
        </button>
        <button id="btn-settings" class="tb-btn" title="エディタ設定">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.8v2M8 12.2v2M1.8 8h2M12.2 8h2M3.6 3.6l1.4 1.4M11 11l1.4 1.4M12.4 3.6L11 5M5 11l-1.4 1.4"/></svg>
        </button>
      </div>
    </header>

    <!-- 読書プログレスバー(ツールバー下端の細いライン) -->
    <div id="progress" aria-hidden="true"></div>

    <div id="find-bar" class="hidden">
      <svg class="find-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="7" cy="7" r="4.2"/><path d="M10.2 10.2L14 14"/></svg>
      <input id="find-input" type="text" spellcheck="false" placeholder="ページ内を検索" />
      <span id="find-count">0/0</span>
      <div class="find-nav">
        <button id="find-prev" class="find-btn" title="前へ (⇧Enter)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10l4-4 4 4"/></svg>
        </button>
        <button id="find-next" class="find-btn" title="次へ (Enter)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
        </button>
        <button id="find-close" class="find-btn" title="閉じる (Esc)">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </button>
      </div>
    </div>

    <div id="settings-pop" class="hidden">
      <label for="editor-cmd">外部エディタのコマンド</label>
      <input id="editor-cmd" type="text" spellcheck="false" placeholder="code {path}" />
      <p class="hint">
        {path} がファイルパスに置き換わります(省略時は末尾に付加)。<br />
        例: <code>code {path}</code> / <code>open -a "Visual Studio Code" {path}</code> / <code>subl {path}</code>
      </p>
      <button id="settings-save">保存</button>
    </div>

    <main id="viewport">
      <div id="empty">
        <div class="drop-card">
          <div class="mark">M<span>↓</span></div>
          <p class="lead">Markdown ファイルをここにドロップ</p>
          <p class="sub">または <kbd>⌘O</kbd> で開く — GFM・Mermaid・Marp 対応</p>
          <button id="empty-open">ファイルを開く</button>
        </div>
        <div id="recents" class="hidden">
          <h2>最近開いたファイル</h2>
          <ul id="recent-list"></ul>
        </div>
      </div>

      <article id="doc" class="markdown-body hidden"></article>
      <div id="slides" class="hidden"></div>
    </main>

    <div id="toast" class="hidden"></div>
    <div id="link-status" class="hidden" aria-hidden="true"></div>
  </body>
</html>
